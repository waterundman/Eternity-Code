constraints:
  immutable_modules:
    - path: src/storage/db
      reason: 数据库层，改动需要谨慎
      until: null
  stable_interfaces:
    - name: Session API
      spec: session.create, session.prompt, session.messages
      breaking_change_def: 删除或重命名任何核心方法
  performance_budget:
    - metric: startup_time
      threshold: < 10秒
      measurement_spec: time bun dev .
      hard: true
  compliance:
    - 不收集用户对话内容用于训练
    - API密钥必须安全存储
    - 不向第三方发送用户代码
    - 不行
rejected_directions:
  - id: NEG-001
    text: 添加Web界面
    reason: 专注于TUI体验，Web界面会分散开发资源
    scope:
      type: permanent
      condition: null
      until_phase: null
    source_card: null
    created_at: '2025-03-21T00:00:00Z'
    status: active
    lifted_at: null
    lifted_note: null
  - id: NEG-002
    text: 支持VS Code插件
    reason: 保持独立TUI工具定位，不做IDE集成
    scope:
      type: permanent
      condition: null
      until_phase: null
    source_card: null
    created_at: '2025-03-21T00:00:00Z'
    status: active
    lifted_at: null
    lifted_note: null
eval_factors:
  - id: EVAL-001
    name: TUI响应速度
    role:
      type: objective
      proxies_for: null
    measurement:
      type: metric
      spec: 用户输入到界面响应的时间
      llm_prompt: null
      llm_scale: null
      human_criteria: null
    threshold:
      target: < 100ms
      floor: < 500ms
      baseline: 150ms
    relations:
      conflicts_with: null
      depends_on: null
      weight: 0.4
    lifecycle:
      active_from: mvp
      active_until: null
      review_at: null
  - id: EVAL-002
    name: 代码生成质量
    role:
      type: objective
      proxies_for: null
    measurement:
      type: llm_eval
      spec: 对生成的代码进行质量评估
      llm_prompt: 评估以下代码的质量，包括正确性、可读性和效率。评分1-5。
      llm_scale: 1-5，5=最高质量
      human_criteria: null
    threshold:
      target: ≥ 4.0
      floor: ≥ 3.0
      baseline: '3.5'
    relations:
      conflicts_with: null
      depends_on: null
      weight: 0.6
    lifecycle:
      active_from: mvp
      active_until: null
      review_at: null
search_policy:
  mode: balanced
  max_cards_per_loop: 3
  exploration_rate: 0.25
  candidate_sources:
    - source: coverage_gap
      weight: 0.45
    - source: eval_regression
      weight: 0.3
    - source: tech_debt
      weight: 0.15
    - source: free_exploration
      weight: 0.1
  warn_proximity_to:
    - immutable_modules
    - rejected_directions
    - performance_budget
