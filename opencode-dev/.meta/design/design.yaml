_schema_version: 1.0.0
_schema_type: meta_design
project:
  id: test-opencode-001
  name: opencode-fork
  stage: mvp
  core_value: 提供一个轻量级、高效的AI编程助手TUI工具
  anti_value: 不追求功能大而全，专注于核心TUI体验
  tech_stack:
    primary:
      - TypeScript
      - Bun
      - SolidJS
    forbidden:
      - path: python
        reason: 保持单一语言栈，降低维护复杂度
        until: null
  created_at: '2025-03-21T00:00:00Z'
  updated_at: '2025-03-21T00:00:00Z'
requirements:
  - id: REQ-001
    text: 用户能在10秒内启动TUI并开始对话
    priority: p0
    signal:
      type: metric
      spec: 从命令执行到TUI显示的时间 < 10秒
    coverage: 0.9
    coverage_note: 当前启动速度良好，基本满足要求
    last_checked: '2025-03-21T00:00:00Z'
  - id: REQ-002
    text: 支持多种AI提供商的无缝切换
    priority: p0
    signal:
      type: behavior
      spec: 用户可以通过配置切换不同的AI提供商
    coverage: 0.85
    coverage_note: 已支持主流提供商，配置机制完善
    last_checked: '2025-03-21T00:00:00Z'
  - id: REQ-003
    text: MetaDesign循环能自动生成改进卡片
    priority: p1
    signal:
      type: behavior
      spec: /meta命令能正确分析代码并生成格式化的卡片
    coverage: 0.6
    coverage_note: 基础功能已实现，需要更多测试验证
    last_checked: '2025-03-21T00:00:00Z'
