  prediction_accuracy: 0.81
  deviation_explanation: |
    可解释性仅提升 0.6（预测中值），未达预测上限 1.0。
    原因：GLM 在少数题型（开放题）的依据生成较笼统，few-shot 覆盖不足。
    Latency 实测 +75ms，在预测范围内。完成率提升 +3%，符合预测下限。

  lessons:
    - "few-shot 示例需覆盖开放题、选择题、填空题三种题型，不能只用一种"
    - "依据说明长度限制 20 字在开放题场景下过紧，建议放宽至 35 字"
    - "可解释性与题型强相关，下一轮可针对开放题单独优化 prompt"

