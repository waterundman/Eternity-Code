# meta/cards/CARD-NNN.schema.yaml
# ─────────────────────────────────────────────────────────────
# One file per card. Cards are immutable after resolution.
# Agent writes proposed cards; human resolves them; agent
# writes outcome after execution.
# ─────────────────────────────────────────────────────────────

_schema_version: "1.0.0"
_schema_type: decision_card

id: string                            # "CARD-001" — sequential
loop_id: string                       # which loop generated this
req_refs:
  type: array
  items: string                       # REQ ids this card addresses

# ── card content (agent-written) ─────────────────────────────
content:
  objective: string                   # what goal this achieves
  approach: string                    # how it will be implemented
  benefit: string                     # expected positive outcome
  cost: string                        # explicit tradeoff or side effect
  risk: string                        # what could go wrong
  
  # Which files/modules will be touched
  scope:
    type: array
    items: string                     # file paths (relative)
  
  # Proximity warnings auto-generated by agent
  # before presenting card to human
  warnings:
    type: array
    items:
      type:
        type: enum
        values: [near_negative, near_constraint, conflicts_eval]
      ref: string                     # NEG/constraint/EVAL id
      message: string

# ── agent prediction ─────────────────────────────────────────
prediction:
  confidence: float                   # 0.0–1.0
  basis: string                       # why this confidence level
  assumptions:
    type: array
    items: string                     # what must be true for prediction to hold
  
  # Per-eval estimated delta (agent's forecast)
  eval_deltas:
    type: array
    items:
      eval_id: string
      direction:
        type: enum
        values: [increase, decrease, neutral, unknown]
      magnitude: string               # "+12%", "~80ms", "unclear"

# ── human decision ───────────────────────────────────────────
decision:
  status:
    type: enum
    values: [pending, accepted, rejected, merged]
  
  chosen_by: string                   # user identifier or "human"
  resolved_at: datetime | null
  
  # Human's reason — this is the most valuable input in the system.
  # Agent uses this to write RejectedDirection.reason when status=rejected.
  note: string | null
  
  # If merged: which cards were combined to produce this one
  merged_from:
    type: array | null
    items: string                     # CARD ids

# ── outcome (agent-written after execution) ──────────────────
# Filled in at loop end. null until then.
outcome:
  type: object | null
  
  status:
    type: enum
    values: [success, partial, rolled_back]
  
  # Actual eval deltas measured post-execution
  actual_eval_deltas:
    type: array
    items:
      eval_id: string
      before: string
      after: string
      delta: string
  
  # Prediction accuracy: actual vs predicted per eval
  prediction_accuracy: float          # 0.0–1.0 across all evals
  deviation_explanation: string       # why prediction was off (if it was)
  
  # What the agent learned from this card's execution
  # Fed into next loop's candidate generation
  lessons:
    type: array
    items: string
  
  # If any constraint floor was breached during execution
  constraint_breaches:
    type: array
    items:
      constraint_ref: string
      measured_value: string
      threshold: string
      action_taken: string            # "rolled back", "warned", etc.
  
  committed_at: datetime | null
